<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的第一篇博客</title>
    <style>
        body {
            max-width: 700px;
            margin: 40px auto;
            font-family: sans-serif;
            line-height: 1.7;
        }
        img {
            max-width: 100%;
            display: block;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🎙️ 我的播客：第一次发布</h1>
    <p>欢迎大家来到我的博客！下面是我展示的两张图片。</p>
    
    <h2>图片一：绝对路径引用</h2>
    <!-- 使用网上的绝对 URL，指向 picsum.photos 的固定图片 -->
    <img src="https://picsum.photos/id/237/600/400" alt="绝对路径示例图（网络图片）">
    <p>▲ 这张图片的地址是完整的网址（<code>https://picsum.photos/id/237/600/400</code>），这就是绝对路径。</p>
    
    <h2>图片二：相对路径引用</h2>
    <!-- 使用相对路径，指向仓库里的 image/1.jpg -->
    <img src="image/1.jpg" alt="相对路径示例图">
    <p>▲ 这张图片的地址只写了 <code>image/1.jpg</code>，它是相对于当前页面的位置，这就是相对路径。</p>
    
    <hr>
    <p>发布于：2026年5月7日</p>
</body>
</html>
